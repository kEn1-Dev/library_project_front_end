<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/> <!-- Indigo -->
      <stop offset="100%" stop-color="#A855F7"/> <!-- Purple -->
    </linearGradient>
    <linearGradient id="coralGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899"/> <!-- Pink/Magenta -->
      <stop offset="100%" stop-color="#F97316"/> <!-- Orange -->
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5"/> <!-- Indigo -->
      <stop offset="100%" stop-color="#EC4899"/> <!-- Pink/Coral -->
    </linearGradient>
    
    <!-- Shadow for depth -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Graphic Elements Group -->
  <g transform="translate(0, -10)">
    <!-- Left Bubble (Purple) -->
    <path d="M 210,150 C 145,150 100,195 100,250 C 100,283 115,312 142,329 L 131,365 L 170,352 C 182,357 196,360 210,360 C 275,360 320,315 320,250 C 320,195 275,150 210,150 Z" fill="url(#purpleGrad)" opacity="0.9" filter="url(#dropShadow)"/>

    <!-- Right Bubble (Coral/Orange) -->
    <path d="M 290,150 C 355,150 400,195 400,250 C 400,283 385,312 358,329 L 369,365 L 330,352 C 318,357 304,360 290,360 C 225,360 180,315 180,250 C 180,195 225,150 290,150 Z" fill="url(#coralGrad)" opacity="0.85" filter="url(#dropShadow)"/>
          
    <!-- Intersection Line Detail (representing the 'pages' of a book formed by their overlap) -->
    <path d="M 250,165 L 250,335" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- Typography (Only UniShare, centered, bold, no subtitle) -->
  <text x="250" y="430" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="52" font-weight="850" fill="url(#textGrad)" text-anchor="middle" letter-spacing="-0.5">UniShare</text>
</svg>
